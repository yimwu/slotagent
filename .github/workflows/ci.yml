name: Code Quality Checks

on:
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    name: Code Quality and Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Code formatting check (Black)
        run: |
          black --check src/slotagent tests/
        continue-on-error: false

      - name: Import sorting check (isort)
        run: |
          isort --check-only src/slotagent tests/
        continue-on-error: false

      - name: Lint check (Flake8)
        run: |
          flake8 src/slotagent tests/ --max-line-length=100 --extend-ignore=E203,E501
        continue-on-error: false

      - name: Type check (MyPy)
        run: |
          mypy src/slotagent --ignore-missing-imports
        continue-on-error: true  # 类型检查暂时不强制

      - name: Run tests with coverage
        run: |
          pytest --cov=src/slotagent --cov-report=xml --cov-report=term-missing tests/

      - name: Check coverage threshold
        run: |
          coverage report --fail-under=85
        continue-on-error: true  # Phase 1 暂无测试,不强制

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Complexity check (Radon)
        run: |
          radon cc src/slotagent -a -nb
          radon mi src/slotagent -nb
        continue-on-error: true

  summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: quality
    if: always()
    steps:
      - name: Check quality results
        run: |
          if [ "${{ needs.quality.result }}" != "success" ]; then
            echo "❌ Quality checks failed"
            exit 1
          else
            echo "✅ All quality checks passed"
          fi
