name: Lint Only

# 快速Lint检查工作流,用于PR的快速反馈
on:
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Quick Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort

      - name: Black check
        run: black --check src/slotagent tests/

      - name: Flake8 check
        run: flake8 src/slotagent tests/ --max-line-length=100 --extend-ignore=E203,E501

      - name: Isort check
        run: isort --check-only src/slotagent tests/
